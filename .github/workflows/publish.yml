name: Publish to Maven Central

on:
  workflow_run:
    workflows: ["Java CI with Maven"]
    types:
      - completed
    branches:
      - 'ffmpeg-*' # Only trigger when a tag matching ffmpeg-* was pushed
  workflow_dispatch:
    inputs:
      skipTests:
        description: 'Skip tests during publish'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only run if the triggering workflow succeeded (for workflow_run)
    # or if manually triggered (for workflow_dispatch)
    if: ${{ (github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch') }}
    environment: publish
    steps:
      - uses: actions/checkout@v4

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
          cache: 'maven'

      - name: Publish to Sonatype Central Portal
        run: |
          mvn clean deploy \
            -DskipTests=${{ github.event.inputs.skipTests || 'true' }} \
            --no-transfer-progress \
            -P Java11+
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
