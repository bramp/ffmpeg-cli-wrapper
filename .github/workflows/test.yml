name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  format:
    runs-on: ubuntu-latest
    name: Format Check
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check formatting (Google Java Style)
        run: mvn --batch-mode fmt:check

      - name: Check style (Google Java Style)
        run: mvn --batch-mode checkstyle:check

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [11, 17, 21]

    name: Test JDK ${{ matrix.java-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up FFmpeg
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: FedericoCarboni/setup-ffmpeg@v3
          attempt_limit: 3
          attempt_delay: 5000
          with: '{ "ffmpeg-version": "release" }'

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Test with Maven
        run: mvn --batch-mode verify -Dgpg.skip

      - name: Check EXAMPLES.md is up to date
        if: matrix.java-version == '21'
        run: |
          python3 tools/generate_examples.py
          if ! git diff --quiet EXAMPLES.md README.md; then
            echo "::error::EXAMPLES.md or README.md is out of date. Run 'make examples' and commit the result."
            git diff EXAMPLES.md README.md
            exit 1
          fi

      - name: Update dependency graph
        if: matrix.java-version == '21' && github.event_name == 'push'
        uses: advanced-security/maven-dependency-submission-action@v5
        continue-on-error: true
