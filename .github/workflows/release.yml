name: Release

on:
  push:
    tags: [ "ffmpeg-*" ]
  workflow_dispatch:

jobs:
  test:
    # Only run tests on tag push (manual dispatch skips to javadoc)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [11, 17, 21]

    name: JDK ${{ matrix.java-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Test with Maven
        run: mvn --batch-mode verify -Dgpg.skip

  publish:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
          cache: 'maven'

      - name: Publish to Sonatype Central Portal
        run: |
          mvn clean deploy \
            -DskipTests=true \
            --no-transfer-progress \
            -Dgpg.skip=false
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  javadoc:
    needs: [test, publish]
    # Run even when test/publish are skipped (manual dispatch)
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate Javadoc
        run: mvn javadoc:javadoc --no-transfer-progress -Dgpg.skip

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: target/site/apidocs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
